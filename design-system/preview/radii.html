<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--bc-paper-2); border: var(--bw-2) solid var(--bc-line-strong); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2); font-weight: 600; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head><body>
  <div class="row">
    <div class="step"><div class="box" style="border-radius:0"></div><div class="lbl">R-0</div><div class="v">0px</div></div>
    <div class="step"><div class="box" style="border-radius:2px"></div><div class="lbl">R-1</div><div class="v">2px</div></div>
    <div class="step"><div class="box" style="border-radius:4px"></div><div class="lbl">R-2 · default</div><div class="v">4px</div></div>
    <div class="step"><div class="box" style="border-radius:6px"></div><div class="lbl">R-3</div><div class="v">6px</div></div>
    <div class="step"><div class="box" style="border-radius:8px"></div><div class="lbl">R-4 · card</div><div class="v">8px</div></div>
    <div class="step"><div class="box" style="border-radius:12px"></div><div class="lbl">R-5 · sheet</div><div class="v">12px</div></div>
    <div class="step"><div class="box" style="border-radius:999px;background:var(--bc-green);border-color:var(--bc-green);width:18px;height:18px;margin-top:23px;margin-bottom:23px"></div><div class="lbl">Pill · dot only</div><div class="v">999px</div></div>
  </div>
</body></html>
