<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 18px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ico { width: 28px; height: 28px; color: var(--bc-ink); }
  .nm { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-3); }
  .meta {
    margin-top: 16px;
    padding-top: 12px;
    border-top: var(--bw-2) solid var(--bc-line-strong);
    display: flex; gap: 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg-3);
  }
  .meta b { color: var(--fg-2); font-weight: 600; }
  .flag { margin-left: auto; color: var(--bc-red); font-weight: 600; }
</style></head><body>
  <div class="grid">
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/clipboard-list.svg"><div class="nm">Punch</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/home.svg"><div class="nm">Lot</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/hard-hat.svg"><div class="nm">Trade</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/camera.svg"><div class="nm">Photo</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/mic.svg"><div class="nm">Voice</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/check-circle.svg"><div class="nm">Close</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/alert-triangle.svg"><div class="nm">Defect</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/wrench.svg"><div class="nm">Repair</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/calendar.svg"><div class="nm">Due</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/users.svg"><div class="nm">Team</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/message-square.svg"><div class="nm">Comms</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/shield-check.svg"><div class="nm">Safety</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/file-text.svg"><div class="nm">Report</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/map-pin.svg"><div class="nm">Site</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/cloud-off.svg"><div class="nm">Offline</div></div>
    <div class="cell"><img class="ico" src="https://unpkg.com/lucide-static@latest/icons/settings.svg"><div class="nm">Settings</div></div>
  </div>
  <div class="meta">
    <span><b>Set</b> Lucide</span>
    <span><b>Stroke</b> 1.75px</span>
    <span><b>Default</b> 24px · inherits currentColor</span>
    <span class="flag">⚠ Substitution — confirm production set</span>
  </div>
</body></html>
