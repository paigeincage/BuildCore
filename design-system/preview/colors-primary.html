<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw {
    border: var(--bw-2) solid var(--bc-line-strong);
    border-radius: var(--r-2);
    overflow: hidden;
  }
  .chip { height: 84px; }
  .info {
    padding: 8px 10px;
    background: var(--bc-paper);
    display: flex; flex-direction: column; gap: 2px;
    border-top: var(--bw-2) solid var(--bc-line-strong);
  }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; }
  .hex {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: -0.01em;
    color: var(--fg-3);
    text-transform: uppercase;
  }
</style></head><body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#C45A2C"></div><div class="info"><div class="name">Orange</div><div class="hex">#C45A2C · BC-Orange</div></div></div>
    <div class="sw"><div class="chip" style="background:#A84A22"></div><div class="info"><div class="name">Orange Press</div><div class="hex">#A84A22</div></div></div>
    <div class="sw"><div class="chip" style="background:#FBEDE3"></div><div class="info"><div class="name">Orange Tint</div><div class="hex">#FBEDE3</div></div></div>
    <div class="sw"><div class="chip" style="background:#F0B500"></div><div class="info"><div class="name">Hi-Vis</div><div class="hex">#F0B500 · Caution</div></div></div>
  </div>
</body></html>
