<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .id {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 6px 10px;
    background: var(--bc-paper-2);
    border: 1.5px solid var(--bc-line);
    border-radius: var(--r-2);
    color: var(--bc-ink);
  }
  .ts {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .big {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 32px;
    letter-spacing: -0.01em;
    color: var(--bc-ink);
    margin-top: 14px;
  }
  .big .u { color: var(--fg-3); font-weight: 400; font-size: 18px; margin-left: 6px; }
  .meta {
    margin-top: 14px;
    padding-top: 10px;
    border-top: var(--bw-2) solid var(--bc-line-strong);
    display: flex; gap: 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg-3);
  }
  .meta b { color: var(--fg-2); font-weight: 600; }
</style></head><body>
  <div class="row">
    <span class="id">PL-1023</span>
    <span class="id">Lot 247</span>
    <span class="id">Trade · Plumbing</span>
    <span class="ts">Walk · 2026-05-17 · 09:42</span>
  </div>
  <div class="big">23<span class="u">open</span> · 117<span class="u">closed</span></div>
  <div class="meta">
    <span><b>Geist Mono</b> · 400/600</span>
    <span><b>Use</b> IDs · lot # · trade tag · timestamps · tabular data</span>
  </div>
</body></html>
