<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; }

  .icon { width: 84px; height: 84px; border-radius: 18px; flex-shrink: 0; }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }

</style></head><body>
  <div class="row">
    <div class="item">
      <img class="icon" src="../assets/condenser-icon.svg" alt="">
      <div>
        <div class="name">The Condenser</div>
        <div class="sub">Mobile punch list app</div>
      </div>
    </div>
    <div class="item">
      <img class="icon" src="../assets/ops-icon.svg" alt="">
      <div>
        <div class="name">BuildCore Ops</div>
        <div class="sub">Daily field operations</div>
      </div>
    </div>
  </div>
</body></html>
