<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .row { display: flex; gap: 24px; align-items: center; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 88px; height: 56px; background: var(--bc-paper); border: 1.5px solid var(--bc-line); border-radius: var(--r-2); }
  .box.stamp { border: var(--bw-2) solid var(--bc-ink); box-shadow: 3px 3px 0 0 var(--bc-ink); }
  .box.s1 { box-shadow: 0 1px 0 0 rgba(20,17,13,0.06); }
  .box.s2 { box-shadow: 0 2px 6px -2px rgba(20,17,13,0.12), 0 1px 0 0 rgba(20,17,13,0.06); }
  .box.s3 { box-shadow: 0 12px 32px -12px rgba(20,17,13,0.28), 0 2px 0 0 rgba(20,17,13,0.08); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2); font-weight: 600; }
  .sub { font-family: var(--font-body); font-size: 10px; color: var(--fg-3); text-align: center; max-width: 90px; }
</style></head><body>
  <div class="row">
    <div class="step"><div class="box"></div><div class="lbl">Shadow-0</div><div class="sub">Flat — default</div></div>
    <div class="step"><div class="box s1"></div><div class="lbl">Shadow-1</div><div class="sub">List row lift</div></div>
    <div class="step"><div class="box s2"></div><div class="lbl">Shadow-2</div><div class="sub">Menu / dropdown</div></div>
    <div class="step"><div class="box s3"></div><div class="lbl">Shadow-3</div><div class="sub">Sheet / modal</div></div>
    <div class="step"><div class="box stamp"></div><div class="lbl">Shadow-Stamp</div><div class="sub">Punch ticket · primary CTA</div></div>
  </div>
</body></html>
