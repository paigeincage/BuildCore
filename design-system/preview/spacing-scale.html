<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .bar { background: var(--bc-ink); border-radius: var(--r-1); }
  .nm { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2); font-weight: 600; }
  .sz { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head><body>
  <div class="scale">
    <div class="step"><div class="bar" style="width:4px;height:4px"></div><div class="nm">SP-1</div><div class="sz">4px</div></div>
    <div class="step"><div class="bar" style="width:8px;height:8px"></div><div class="nm">SP-2</div><div class="sz">8px</div></div>
    <div class="step"><div class="bar" style="width:12px;height:12px"></div><div class="nm">SP-3</div><div class="sz">12px</div></div>
    <div class="step"><div class="bar" style="width:16px;height:16px"></div><div class="nm">SP-4</div><div class="sz">16px</div></div>
    <div class="step"><div class="bar" style="width:24px;height:24px"></div><div class="nm">SP-6</div><div class="sz">24px</div></div>
    <div class="step"><div class="bar" style="width:32px;height:32px"></div><div class="nm">SP-7</div><div class="sz">32px</div></div>
    <div class="step"><div class="bar" style="width:40px;height:40px"></div><div class="nm">SP-8</div><div class="sz">40px</div></div>
    <div class="step"><div class="bar" style="width:56px;height:56px"></div><div class="nm">SP-9</div><div class="sz">56px</div></div>
    <div class="step"><div class="bar" style="width:72px;height:72px"></div><div class="nm">SP-10</div><div class="sz">72px</div></div>
  </div>
</body></html>
