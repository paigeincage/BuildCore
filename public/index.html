<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BuildCore — Walk it. Log it. Close it out.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#C45A2C">
  <meta name="description" content="Punch lists, daily reports, and trade comms — one mobile app, offline-first, built for residential construction managers.">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">

        <div>
          <SiteHeader />
