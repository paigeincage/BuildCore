<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border: var(--bw-2) solid var(--bc-line-strong); border-radius: var(--r-2); overflow: hidden; }
  .chip { height: 64px; display:flex; align-items:flex-end; padding: 8px 10px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.9); }
  .info { padding: 8px 10px; background: var(--bc-paper); border-top: var(--bw-2) solid var(--bc-line-strong); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-transform: uppercase; }
  .pair { display:flex; gap:4px; align-items:center; margin-top: 2px; }
  .dot { width:10px; height:10px; border-radius:999px; border: 1.5px solid var(--bc-ink); }
</style></head><body>
  <div class="swatches">
    <div class="sw">
      <div class="chip" style="background:#2E7D3A">PASS</div>
      <div class="info"><div class="name">Green</div><div class="hex">#2E7D3A</div><div class="pair"><span class="dot" style="background:#2E7D3A"></span><span class="hex">Complete</span></div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#F0B500;color:#14110D">WARN</div>
      <div class="info"><div class="name">Hi-Vis</div><div class="hex">#F0B500</div><div class="pair"><span class="dot" style="background:#F0B500"></span><span class="hex">In progress</span></div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#B82A1F">FAIL</div>
      <div class="info"><div class="name">Red</div><div class="hex">#B82A1F</div><div class="pair"><span class="dot" style="background:#B82A1F"></span><span class="hex">Defect / blocker</span></div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#1F5A8A">INFO</div>
      <div class="info"><div class="name">Blue</div><div class="hex">#1F5A8A</div><div class="pair"><span class="dot" style="background:#1F5A8A"></span><span class="hex">Inspection</span></div></div>
    </div>
  </div>
</body></html>
