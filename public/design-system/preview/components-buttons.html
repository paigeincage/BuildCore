<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display:flex; flex-direction:column; gap: 18px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.005em;
    height: 56px;
    padding: 0 22px;
    border-radius: var(--r-2);
    border: var(--bw-2) solid var(--bc-ink);
    background: var(--bc-orange);
    color: var(--bc-paper);
    cursor: pointer;
    transition: transform var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out), background var(--dur-2) var(--ease-out);
    box-shadow: 3px 3px 0 0 var(--bc-ink);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn:hover { background: var(--bc-orange-press); }
  .btn:active { transform: translate(3px,3px); box-shadow: 0 0 0 0 var(--bc-ink); }
  .btn.secondary { background: var(--bc-paper); color: var(--bc-ink); }
  .btn.ghost { background: transparent; border-color: var(--bc-ink); color: var(--bc-ink); box-shadow: none; }
  .btn.danger { background: var(--bc-red); color: var(--bc-paper); }
  .btn.sm { height: 40px; padding: 0 14px; font-size: 14px; box-shadow: 2px 2px 0 0 var(--bc-ink); }
  .btn.icon-only { width: 56px; padding: 0; justify-content:center; }
  .tag { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); width: 100%; margin-bottom: -8px;}
</style></head><body>
  <div>
    <div class="tag">Primary · secondary · ghost · danger — 56px tall</div>
    <div class="row" style="margin-top:8px">
      <button class="btn">Send to trade</button>
      <button class="btn secondary">Save draft</button>
      <button class="btn ghost">Cancel</button>
      <button class="btn danger">Mark defect</button>
    </div>
  </div>
  <div>
    <div class="tag">Small · 40px tall — only in dense surfaces</div>
    <div class="row" style="margin-top:8px">
      <button class="btn sm">Add note</button>
      <button class="btn sm secondary">Filter</button>
      <button class="btn sm icon-only" aria-label="Add">＋</button>
    </div>
  </div>
</body></html>
