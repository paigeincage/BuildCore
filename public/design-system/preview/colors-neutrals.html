<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 140px 1fr 1fr 1fr 1fr 1fr; gap: 0; align-items: stretch; border: var(--bw-2) solid var(--bc-line-strong); border-radius: var(--r-2); overflow: hidden; }
  .row + .row { margin-top: 8px; }
  .hd { display:flex; align-items:center; padding: 0 12px; font-family: var(--font-display); font-weight: 700; font-size: 13px; background: var(--bc-paper); border-right: var(--bw-2) solid var(--bc-line-strong); }
  .cell { padding: 14px 10px 8px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(20,17,13,0.6); }
  .cell.dark { color: rgba(255,255,255,0.65); }
</style></head><body>
  <div class="stack">
    <div class="row">
      <div class="hd">Paper</div>
      <div class="cell" style="background:#FAFAF7">#FAFAF7</div>
      <div class="cell" style="background:#F1EFE9">#F1EFE9</div>
      <div class="cell" style="background:#E5E2DA">#E5E2DA</div>
      <div class="cell" style="background:#D6D2C7">#D6D2C7</div>
      <div class="cell dark" style="background:#9A938A">#9A938A</div>
    </div>
    <div class="row">
      <div class="hd">Ink</div>
      <div class="cell dark" style="background:#6E6860">#6E6860</div>
      <div class="cell dark" style="background:#3A3530">#3A3530</div>
      <div class="cell dark" style="background:#2A2722">#2A2722</div>
      <div class="cell dark" style="background:#14110D">#14110D</div>
      <div class="cell" style="background:#FAFAF7;color:#14110D;font-weight:600">17:1 AAA</div>
    </div>
  </div>
</body></html>
