<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Condenser — Site detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bc-paper-2); color: var(--bc-ink); font-family: var(--font-body); overflow-x: hidden; }
    .phone *::-webkit-scrollbar { width:0; height:0; display:none; }
    .phone * { scrollbar-width: none; -ms-overflow-style: none; }

    .stage { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; }
    .meta { max-width: 540px; text-align: center; display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .meta .eyebrow { font-family: var(--font-mono); font-weight: 600; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bc-orange); }
    .meta h1 { font-family: var(--font-display); font-weight: 900; font-size: 26px; letter-spacing: -0.025em; line-height: 1.05; margin: 0; }
    .meta p { font-size: 13.5px; color: var(--bc-ink-2); margin: 0; line-height: 1.5; }
    .postit { background: #FBF1CC; border: 1.5px solid #E8D068; border-radius: var(--r-2); padding: 8px 12px; font-family: var(--font-mono); font-size: 10.5px; color: var(--bc-ink-2); letter-spacing: 0.02em; }
    .postit b { color: var(--bc-ink); }

    .phone-fit { --s: 1; width: calc(360px * var(--s)); height: calc(720px * var(--s)); position: relative; flex-shrink: 0; }
    .phone {
      width: 360px; height: 720px; background: #14110D; border-radius: 42px; padding: 8px;
      box-shadow: 0 30px 60px rgba(20,17,13,0.18), 0 0 0 2px var(--bc-ink);
      position: absolute; top: 0; left: 0; transform: scale(var(--s)); transform-origin: top left;
    }
    .phone .notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 100px; height: 26px; background: #000; border-radius: 18px; z-index: 5; }
    .phone .screen { width: 100%; height: 100%; background: var(--bc-paper); border-radius: 34px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="site-detail.jsx"></script>
</head>
<body>
  <div class="stage">
    <div class="meta">
      <div class="eyebrow">Native app · Round 2 · Screen 7 of 8</div>
      <h1>Site detail</h1>
      <p>Address hero · walk-type chip · stamped stat strip · progress bar · 2-up actions (Add files → Intake · Send list → Send sheet) · open punch preview · recent activity. One scroll.</p>
      <div class="postit"><b>⚠ Sample data</b> — Sycamore Ln + Cypress B are placeholders.</div>
    </div>

    <div class="phone-fit">
      <div class="phone">
        <div class="notch"></div>
        <div class="screen" id="phone-screen"></div>
      </div>
    </div>
  </div>

  <script>
    function fitPhone() {
      const wrap = document.querySelector('.phone-fit');
      if (!wrap) return;
      const vw = Math.max(280, window.innerWidth - 40);
      const vh = Math.max(420, window.innerHeight - 220);
      const s = Math.min(1, vw / 360, vh / 720);
      wrap.style.setProperty('--s', s);
    }
    window.addEventListener('resize', fitPhone, { passive: true });
    fitPhone();
  </script>
  <script type="text/babel">
    const mount = () => {
      const el = document.getElementById('phone-screen');
      if (!el || typeof SiteDetailScreen === 'undefined') { requestAnimationFrame(mount); return; }
      ReactDOM.createRoot(el).render(<SiteDetailScreen />);
      requestAnimationFrame(fitPhone);
    };
    mount();
  </script>
</body>
</html>
