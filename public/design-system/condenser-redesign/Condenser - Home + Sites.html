<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Condenser — Home + Sites</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bc-paper-2); color: var(--bc-ink); font-family: var(--font-body);
      overflow: hidden; overscroll-behavior: none;
    }

    /* Hide visual scrollbars inside the phones — the layout is sized to fit;
       this is the final polish, not the fix. */
    .phone *::-webkit-scrollbar { width: 0; height: 0; display: none; }
    .phone * { scrollbar-width: none; -ms-overflow-style: none; }

    .stage {
      height: 100dvh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      gap: 28px; padding: 14px 12px;
    }
    /* Stack to single column on narrow viewports */
    @media (max-width: 820px) {
      .stage { flex-direction: column; gap: 14px; padding: 10px 10px; }
    }

    .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .col .label {
      font-family: var(--font-mono); font-weight: 600;
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--bc-ink-3);
    }

    /* Phone shell + auto-scale (same pattern as Home Locked) */
    .phone-fit {
      --s: 1;
      width: calc(360px * var(--s));
      height: calc(720px * var(--s));
      position: relative;
      flex-shrink: 0;
    }
    .phone {
      width: 360px; height: 720px;
      background: #14110D; border-radius: 42px; padding: 8px;
      box-shadow: 0 30px 60px rgba(20,17,13,0.18), 0 0 0 2px var(--bc-ink);
      position: absolute; top: 0; left: 0;
      transform: scale(var(--s)); transform-origin: top left;
    }
    .phone .notch {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 100px; height: 26px; background: #000; border-radius: 18px; z-index: 5;
    }
    .phone .screen {
      width: 100%; height: 100%;
      background: var(--bc-paper);
      border-radius: 34px; overflow: hidden; position: relative;
      display: flex; flex-direction: column;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="home-locked.jsx"></script>
  <script type="text/babel" src="sites-screen.jsx"></script>
</head>
<body>
  <div class="stage" id="stage">
    <div class="col">
      <div class="label">Home</div>
      <div class="phone-fit">
        <div class="phone">
          <div class="notch"></div>
          <div class="screen" id="home-screen"></div>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="label">Sites</div>
      <div class="phone-fit">
        <div class="phone">
          <div class="notch"></div>
          <div class="screen" id="sites-screen"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Auto-fit both phones so the whole stage stays on screen at any viewport.
    function fitPhones() {
      const wraps = document.querySelectorAll('.phone-fit');
      if (!wraps.length) return;
      const stacked = window.innerWidth <= 820;
      const cols = stacked ? 1 : 2;
      const padX = stacked ? 20 : 60;
      const padY = stacked ? 100 : 80;
      const vw = Math.max(280, (window.innerWidth - padX) / cols);
      const vh = Math.max(420, (window.innerHeight - padY) / (stacked ? 2 : 1));
      const s = Math.min(1, vw / 360, vh / 720);
      wraps.forEach(w => w.style.setProperty('--s', s));
    }
    window.addEventListener('resize', fitPhones, { passive: true });
    window.addEventListener('orientationchange', fitPhones, { passive: true });
    fitPhones();
  </script>

  <script type="text/babel">
    const mount = (id, Comp) => {
      const el = document.getElementById(id);
      if (!el || typeof Comp === 'undefined') {
        requestAnimationFrame(() => mount(id, Comp));
        return;
      }
      ReactDOM.createRoot(el).render(<Comp />);
    };
    requestAnimationFrame(() => {
      mount('home-screen',  window.HomeLocked);
      mount('sites-screen', window.SitesScreen);
      requestAnimationFrame(fitPhones);
    });
  </script>
</body>
</html>
